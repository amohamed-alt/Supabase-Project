<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f2f5f3" />
  <meta name="description" content="Talentera Huddle — Acquisition performance, pipeline, lead coverage and financial intelligence powered by Supabase." />
  <title>Talentera Huddle · Supabase Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://amohamed-alt.github.io" crossorigin />
  <link rel="preconnect" href="https://czaxtwbmborxwzaboqxl.supabase.co" crossorigin />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://amohamed-alt.github.io/talentera-huddle/react-preview/styles-v6.css?v=7" />
  <link rel="stylesheet" href="https://amohamed-alt.github.io/talentera-huddle/react-preview/styles-v6-fixes.css?v=7" />
  <link rel="stylesheet" href="https://amohamed-alt.github.io/talentera-huddle/react-preview/deal-movement-v7.css?v=2" />
  <link rel="stylesheet" href="https://amohamed-alt.github.io/talentera-huddle/react-preview/rank-coverage-v2.css?v=1" />
  <link rel="stylesheet" href="https://amohamed-alt.github.io/talentera-huddle/react-preview/rank-coverage-clickable.css?v=1" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
</head>
<body>
  <div id="root"><div style="min-height:100vh;display:grid;place-items:center;font:500 14px Inter,sans-serif;color:#53635b">Loading Talentera Huddle…</div></div>
  <script src="./supabase-adapter.js?v=4"></script>
  <script src="https://amohamed-alt.github.io/talentera-huddle/react-preview/json-fetch-sanitizer.js?v=1"></script>
  <script>
    (() => {
      const JSX_ASSETS = [
        'https://amohamed-alt.github.io/talentera-huddle/react-preview/app-v6.jsx?v=7',
        'https://amohamed-alt.github.io/talentera-huddle/react-preview/deal-movement-v7.jsx?v=2',
        'https://amohamed-alt.github.io/talentera-huddle/react-preview/rank-coverage-v2.jsx?v=1'
      ];
      const SCRIPT_ASSETS = [
        'https://amohamed-alt.github.io/talentera-huddle/react-preview/rank-coverage-clickable.js?v=1',
        'https://amohamed-alt.github.io/talentera-huddle/react-preview/external-links.js?v=2'
      ];

      async function fetchText(url) {
        const response = await fetch(url, { cache: 'force-cache' });
        if (!response.ok) throw new Error(`${url} returned HTTP ${response.status}`);
        return response.text();
      }

      function executeJsxSource(source, url) {
        const transformed = Babel.transform(source, { presets: ['react'], sourceType: 'script', filename: url }).code;
        const script = document.createElement('script');
        script.textContent = `${transformed}\n//# sourceURL=${url}`;
        document.body.appendChild(script);
        script.remove();
      }

      function loadScript(url) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = url;
          script.async = false;
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Could not load ${url}`));
          document.body.appendChild(script);
        });
      }

      async function start() {
        if (!window.React || !window.ReactDOM || !window.Chart || !window.Babel) throw new Error('A required dashboard runtime library did not load.');
        const jsxSources = await Promise.all(JSX_ASSETS.map(fetchText));
        jsxSources.forEach((source, index) => executeJsxSource(source, JSX_ASSETS[index]));
        await Promise.all(SCRIPT_ASSETS.map(loadScript));
        document.documentElement.dataset.huddleReady = 'true';
      }

      start().catch(error => {
        console.error('Talentera Huddle startup failed:', error);
        document.documentElement.dataset.huddleReady = 'false';
        document.getElementById('root').innerHTML = `<div style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#f2f5f3;font-family:Inter,sans-serif"><div style="max-width:680px;padding:24px;border:1px solid #e4ebe7;border-radius:14px;background:#fff;color:#1b2821"><strong style="display:block;font-size:18px">Dashboard startup failed</strong><p style="margin:10px 0 0;color:#53635b;word-break:break-word">${String(error.message || error)}</p></div></div>`;
      });
    })();
  </script>
</body>
</html>
